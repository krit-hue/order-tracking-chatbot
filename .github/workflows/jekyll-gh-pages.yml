# Deploy static site to GitHub Pages (no Jekyll - avoids build errors with large JSON files)
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          mkdir -p _site
          cp index.html config.js script.js styles.css _site/ 2>/dev/null || true
          cp -r assets _site/ 2>/dev/null || true
          cp order.sample.json _site/ 2>/dev/null || true
          cp BLUEPRINTS.md _site/ 2>/dev/null || true
          cp readme _site/ 2>/dev/null || true
          # Ensure index is present
          test -f _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
